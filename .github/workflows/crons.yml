name: Crons Juliana

# Substitui os cron jobs do Vercel (que excedem o limite do plano Hobby).
# Roda no topo de cada hora (UTC) e chama os endpoints na cadência original.
# Requer o secret CRON_SECRET configurado em: repo → Settings → Secrets and variables → Actions.
# (Se o endpoint não exigir secret, o parâmetro é ignorado sem problema.)

on:
  schedule:
    - cron: "0 * * * *" # toda hora
  workflow_dispatch: {} # permite disparo manual pela aba Actions

jobs:
  run-crons:
    runs-on: ubuntu-latest
    env:
      BASE: https://douramor-semijoias.vercel.app
      SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Follow-up (hora em hora)
        run: curl -fsS --max-time 60 "$BASE/api/public/follow-up-cron?secret=$SECRET" || echo "follow-up falhou (ignorado)"

      - name: Pos-venda (hora em hora)
        run: curl -fsS --max-time 60 "$BASE/api/public/pos-venda-cron?secret=$SECRET" || echo "pos-venda falhou (ignorado)"

      - name: Revisao IA (hora em hora)
        run: curl -fsS --max-time 60 "$BASE/api/public/revisao-ia-cron?secret=$SECRET" || echo "revisao falhou (ignorado)"

      - name: Sync Nuvemshop (a cada 2h)
        run: |
          H=$(date -u +%H)
          if [ $((10#$H % 2)) -eq 0 ]; then
            curl -fsS --max-time 120 "$BASE/api/public/hooks/sync-nuvemshop-products?secret=$SECRET" || echo "sync falhou (ignorado)"
          else
            echo "Pulando sync nesta hora ($H UTC) — roda a cada 2h."
          fi
